services:
  - type: web
    name: codepeer
    env: static
    buildCommand: echo "No build step needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
